<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷霆戰機 — 即時狀態</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header>
  <h1>⚡ 雷霆戰機</h1>
  <nav>
    <a href="/">首頁</a>
    <a href="/status" class="active">即時狀態</a>
    <a href="/records">歷史紀錄</a>
  </nav>
</header>

<main>
  <section class="status-panel">
    <h2>📡 即時遊戲狀態</h2>

    <div class="status-grid">
      <div class="stat-card">
        <span class="label">分數</span>
        <span class="value" id="score">---</span>
      </div>
      <div class="stat-card">
        <span class="label">關卡</span>
        <span class="value" id="level">---</span>
      </div>
      <div class="stat-card">
        <span class="label">生命值</span>
        <span class="value" id="lives">---</span>
      </div>
      <div class="stat-card">
        <span class="label">遊戲狀態</span>
        <span class="value badge" id="status-badge">---</span>
      </div>
    </div>

    <!-- 簡易遊戲畫面（Canvas，用圖示代替圖像） -->
    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="320" height="240"></canvas>
      <p class="hint">畫面每秒更新，供觀賞用途</p>
    </div>

    <p class="update-time">最後更新：<span id="last-update">---</span></p>
  </section>
</main>

<footer><p>Thunder Fighter &copy; 2026 — Embedded Systems Project</p></footer>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/static/js/status.js"></script>
</body>
</html>
