<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷霆戰機 — 首頁</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header>
  <h1>⚡ 雷霆戰機</h1>
  <nav>
    <a href="/">首頁</a>
    <a href="/status">即時狀態</a>
    <a href="/records">歷史紀錄</a>
  </nav>
</header>

<main>
  <section class="hero">
    <p class="subtitle">以微控制器為核心的嵌入式射擊遊戲</p>
    <a href="/status" class="btn-primary">▶ 觀看即時狀態</a>
  </section>

  <section class="leaderboard">
    <h2>🏆 最高分排行榜</h2>
    {% if top_scores %}
    <table>
      <thead>
        <tr><th>#</th><th>分數</th><th>關卡</th><th>時間</th></tr>
      </thead>
      <tbody>
        {% for r in top_scores %}
        <tr class="{{ 'gold' if loop.index == 1 else 'silver' if loop.index == 2 else 'bronze' if loop.index == 3 else '' }}">
          <td>{{ loop.index }}</td>
          <td>{{ "{:,}".format(r.score) }}</td>
          <td>Lv.{{ r.level }}</td>
          <td>{{ r.datetime }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p class="empty">尚無紀錄，快去打一局吧！</p>
    {% endif %}
  </section>
</main>

<footer><p>Thunder Fighter &copy; 2026 — Embedded Systems Project</p></footer>
</body>
</html>
