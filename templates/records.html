<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷霆戰機 — 歷史紀錄</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header>
  <h1>⚡ 雷霆戰機</h1>
  <nav>
    <a href="/">首頁</a>
    <a href="/status">即時狀態</a>
    <a href="/records" class="active">歷史紀錄</a>
  </nav>
</header>

<main>
  <section class="records-section">
    <h2>📋 歷史遊戲紀錄</h2>

    <div class="filter-bar">
      <input type="text" id="search" placeholder="搜尋分數或關卡…" oninput="filterTable()">
      <button onclick="sortBy('score')">依分數排序</button>
      <button onclick="sortBy('datetime')">依時間排序</button>
    </div>

    {% if records %}
    <table id="recordsTable">
      <thead>
        <tr>
          <th data-col="id">#</th>
          <th data-col="score">分數</th>
          <th data-col="level">關卡</th>
          <th data-col="datetime">時間</th>
        </tr>
      </thead>
      <tbody>
        {% for r in records %}
        <tr>
          <td>{{ r.id }}</td>
          <td>{{ "{:,}".format(r.score) }}</td>
          <td>Lv.{{ r.level }}</td>
          <td>{{ r.datetime }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <p class="count">共 {{ records|length }} 筆紀錄</p>
    {% else %}
    <p class="empty">尚無歷史紀錄。</p>
    {% endif %}
  </section>
</main>

<footer><p>Thunder Fighter &copy; 2026 — Embedded Systems Project</p></footer>

<script>
function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('#recordsTable tbody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

let sortAsc = true;
function sortBy(col) {
  const colMap = {score: 1, datetime: 3};
  const idx = colMap[col];
  if (idx === undefined) return;
  const tbody = document.querySelector('#recordsTable tbody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const av = a.cells[idx].textContent.replace(/,/g, '');
    const bv = b.cells[idx].textContent.replace(/,/g, '');
    const cmp = isNaN(av) ? av.localeCompare(bv) : Number(av) - Number(bv);
    return sortAsc ? cmp : -cmp;
  });
  sortAsc = !sortAsc;
  rows.forEach(r => tbody.appendChild(r));
}
</script>
</body>
</html>
